services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: login_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-logindb}
      POSTGRES_USER: ${DB_USER:-loginuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Only accessible from within the Docker network — not exposed to host
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loginuser} -d ${DB_NAME:-logindb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App with Native HTTPS ──────────────────────────────────────
  login-service:
    build: .
    container_name: login_service
    restart: unless-stopped
    environment:
      PORT: 8443
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-logindb}
      DB_USER: ${DB_USER:-loginuser}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # HTTPS Configuration
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /etc/letsencrypt/live/securitytdseback.duckdns.org/keystore.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:-changeit}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
    ports:
      - "80:8080"    # HTTP (for redirect)
      - "443:8443"   # HTTPS
    volumes:
      # Mount Let's Encrypt certificates
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
