ServerName YOUR_DOMAIN
ServerTokens Prod
ServerSignature Off

# ── Required modules ──────────────────────────────────────────────────────────
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule headers_module modules/mod_headers.so
LoadModule ratelimit_module modules/mod_ratelimit.so

# ── Security Headers ──────────────────────────────────────────────────────────
Header always set X-Frame-Options DENY
Header always set X-Content-Type-Options nosniff
Header always set X-XSS-Protection "1; mode=block"
Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
Header always set Referrer-Policy "strict-origin-when-cross-origin"

# Don't proxy to anything except our backend
ProxyRequests Off

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName YOUR_DOMAIN

    # Allow Certbot ACME challenge through
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Redirect everything else to HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS VirtualHost ─────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName YOUR_DOMAIN

    # Certbot certs mounted from EC2 host /etc/letsencrypt
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

    # Modern TLS — disable old protocols
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # Pass real client IP to Spring Boot
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # ── Rate limit on auth endpoints (10 req/s per connection) ────────────────
    <Location /api/auth/>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 10
        ProxyPass        http://login-service:8080/api/auth/
        ProxyPassReverse http://login-service:8080/api/auth/
    </Location>

    # ── All other API routes ──────────────────────────────────────────────────
    <Location /api/>
        ProxyPass        http://login-service:8080/api/
        ProxyPassReverse http://login-service:8080/api/
    </Location>

    # ── Health check ──────────────────────────────────────────────────────────
    <Location /actuator/health>
        ProxyPass        http://login-service:8080/actuator/health
        ProxyPassReverse http://login-service:8080/actuator/health
    </Location>

    # Block everything else
    <Location />
        Require all denied
    </Location>

    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
