# =============================================
# Server Configuration
# =============================================
server.port=${PORT:8080}

# SSL/TLS Configuration (when enabled)
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# =============================================
# Database Configuration (from environment)
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/logindb}
spring.datasource.username=${DB_USER:loginuser}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration (from environment)
# =============================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================
# CORS Configuration
# =============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# =============================================
# Swagger/OpenAPI Configuration
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================
# Logging
# =============================================
logging.level.com.secure=INFO
logging.level.org.springframework.security=WARN
