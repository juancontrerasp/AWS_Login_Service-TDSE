events {
    worker_connections 1024;
}

http {
    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://securitytdseback.duckdns.org http://localhost:8080;" always;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name securitytdse.duckdns.org;
        
        # Allow Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name securitytdse.duckdns.org;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/securitytdse.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/securitytdse.duckdns.org/privkey.pem;
        
        # Modern TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Document root
        root /usr/share/nginx/html;
        index index.html;

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Explicit MIME types for common files
        location ~* \.js$ {
            add_header Content-Type application/javascript;
            expires 1h;
        }

        location ~* \.css$ {
            add_header Content-Type text/css;
            expires 1h;
        }

        location ~* \.html$ {
            add_header Content-Type text/html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Compression
        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
        gzip_min_length 1000;

        # Error pages
        error_page 404 /404.html;
        
        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
}
