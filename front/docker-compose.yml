services:
  # ── Apache Frontend Server ──────────────────────────────────────────────────
  apache-frontend:
    image: nginx:alpine
    container_name: frontend_apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Serve all static files from current directory
      - ./:/usr/share/nginx/html/:ro
      # Apache configuration (actually nginx, shhh!)
      - ./apache-frontend.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certificates from EC2 host
      - /etc/letsencrypt:/etc/letsencrypt:ro
